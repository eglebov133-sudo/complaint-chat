<!DOCTYPE html>

<html class="dark" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recipient Selection - Complaint AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom Checkbox Styling to match theme */
        .custom-checkbox:checked {
            background-color: #135bec;
            border-color: #135bec;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
        .custom-checkbox {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid #4b5563; /* Gray-600 */
            border-radius: 0.35rem;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .custom-checkbox:hover {
            border-color: #135bec;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-white">
<!-- Header Navigation -->
<header class="w-full border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-4xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white">
<span class="material-icons-round text-xl">gavel</span>
</div>
<span class="font-bold text-lg tracking-tight">Complaint AI</span>
</div>
<div class="flex items-center gap-4">
<div class="hidden sm:flex items-center text-sm font-medium text-slate-500 dark:text-slate-400">
<span class="flex items-center gap-2">
<span class="w-6 h-6 rounded-full border border-slate-300 dark:border-slate-700 flex items-center justify-center text-xs">1</span>
                        Детали
                    </span>
<div class="w-8 h-px bg-slate-300 dark:bg-slate-700 mx-2"></div>
<span class="flex items-center gap-2">
<span class="w-6 h-6 rounded-full border border-slate-300 dark:border-slate-700 flex items-center justify-center text-xs">2</span>
                        Текст
                    </span>
<div class="w-8 h-px bg-slate-300 dark:bg-slate-700 mx-2"></div>
<span class="flex items-center gap-2 text-primary">
<span class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs">3</span>
                        Получатель
                    </span>
</div>
<div aria-label="User menu" class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-800 overflow-hidden relative" role="button">
<img alt="User Profile Avatar" class="w-full h-full object-cover" data-alt="Small circular user profile picture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrYIWizO4EPzvP02aeaXjzOpPNAoYpBk9Vqw41TOLtqdc5bUccUWmspcvES84kxNe-uA8fqEDrEipqALy26V8uE7LbDtYzIo4oQl-FNt9HaCqEdSDBm1e_2Wo2gRZAt3A9mXWq3aJi6oXHIEOlyevX9vTabK-i8VcP5t2_smyujxyruQEYAnuMpRNFkDhESfKwBa_glow05pe-jwlRMzF86XTjM9GFCk_AFbozaghNG9gCwsIINTyejkCGMN5rAZVuggdapkVJ6sE"/>
</div>
</div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center justify-start pt-8 pb-24 px-4 sm:px-6">
<div class="w-full max-w-2xl">
<!-- Title Section -->
<div class="mb-8 text-center sm:text-left">
<h1 class="text-3xl font-bold mb-2">Куда отправить жалобу?</h1>
<p class="text-slate-500 dark:text-slate-400">
                    На основе анализа текста вашей жалобы, наш AI рекомендует следующие ведомства. Вы можете изменить выбор вручную.
                </p>
</div>
<!-- List Container -->
<div class="space-y-4">
<!-- Recommended Card (Highlighted) -->
<label class="group relative flex items-start gap-4 p-5 rounded-xl border-2 border-primary bg-primary/5 dark:bg-primary/10 cursor-pointer transition-all duration-200 hover:shadow-lg hover:shadow-primary/5">
<div class="flex-shrink-0 pt-1">
<input checked="" class="custom-checkbox focus:ring-0 focus:ring-offset-0" type="checkbox"/>
</div>
<div class="flex-grow">
<div class="flex items-center justify-between mb-1 flex-wrap gap-2">
<h3 class="text-lg font-semibold text-slate-900 dark:text-white group-hover:text-primary transition-colors">Роспотребнадзор</h3>
<div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-primary text-white text-xs font-medium shadow-sm shadow-primary/20">
<span class="material-icons-round text-sm">auto_awesome</span>
                                Рекомендовано AI
                            </div>
</div>
<p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                            Федеральная служба по надзору в сфере защиты прав потребителей и благополучия человека.
                        </p>
<div class="mt-3 flex items-center gap-4 text-xs font-medium text-slate-500 dark:text-slate-400">
<span class="flex items-center gap-1">
<span class="material-icons-round text-base text-green-500">check_circle</span>
                                Высокая вероятность успеха
                            </span>
<span class="flex items-center gap-1">
<span class="material-icons-round text-base">schedule</span>
                                Ответ ~14 дней
                            </span>
</div>
</div>
</label>
<!-- Standard Card 1 -->
<label class="group relative flex items-start gap-4 p-5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 cursor-pointer transition-all duration-200 hover:border-slate-400 dark:hover:border-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800">
<div class="flex-shrink-0 pt-1">
<input class="custom-checkbox focus:ring-0 focus:ring-offset-0" type="checkbox"/>
</div>
<div class="flex-grow">
<div class="flex items-center justify-between mb-1">
<h3 class="text-lg font-semibold text-slate-900 dark:text-white group-hover:text-primary transition-colors">Прокуратура</h3>
</div>
<p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
                            Единая федеральная централизованная система органов, осуществляющая надзор за соблюдением Конституции.
                        </p>
<div class="mt-3 flex items-center gap-4 text-xs font-medium text-slate-500 dark:text-slate-400">
<span class="flex items-center gap-1">
<span class="material-icons-round text-base">schedule</span>
                                Ответ ~30 дней
                            </span>
</div>
</div>
</label>
<!-- Standard Card 2 -->
<label class="group relative flex items-start gap-4 p-5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 cursor-pointer transition-all duration-200 hover:border-slate-400 dark:hover:border-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800">
<div class="flex-shrink-0 pt-1">
<input class="custom-checkbox focus:ring-0 focus:ring-offset-0" type="checkbox"/>
</div>
<div class="flex-grow">
<div class="flex items-center justify-between mb-1">
<h3 class="text-lg font-semibold text-slate-900 dark:text-white group-hover:text-primary transition-colors">Федеральная антимонопольная служба (ФАС)</h3>
</div>
<p class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
                            Федеральный орган исполнительной власти, осуществляющий контроль за соблюдением антимонопольного законодательства.
                        </p>
<div class="mt-3 flex items-center gap-4 text-xs font-medium text-slate-500 dark:text-slate-400">
<span class="flex items-center gap-1">
<span class="material-icons-round text-base">schedule</span>
                                Ответ ~30 дней
                            </span>
</div>
</div>
</label>
<!-- Show More Button -->
<button class="w-full py-3 flex items-center justify-center gap-2 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors">
<span class="material-icons-round">expand_more</span>
                    Показать другие ведомства
                </button>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 dark:bg-[#151c2b]/95 border-t border-slate-200 dark:border-slate-800 backdrop-blur-md z-40">
<div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
<div class="hidden sm:block">
<p class="text-sm text-slate-500 dark:text-slate-400">Выбрано получателей: <span class="font-bold text-slate-900 dark:text-white">1</span></p>
</div>
<div class="flex items-center gap-3 ml-auto w-full sm:w-auto">
<button class="flex-1 sm:flex-none px-6 py-3 rounded-lg border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                    Назад
                </button>
<button class="flex-1 sm:flex-none px-8 py-3 rounded-lg bg-primary hover:bg-primary/90 text-white font-semibold shadow-lg shadow-primary/25 transition-all transform active:scale-95 flex items-center justify-center gap-2">
<span>Отправить выбранным</span>
<span class="material-icons-round text-sm">send</span>
</button>
</div>
</div>
</div>
</body></html>
